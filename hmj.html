<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw WS Controller</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #header { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #status { font-size: 0.9em; padding: 5px 10px; border-radius: 4px; }
        .online { background: #27ae60; }
        .offline { background: #c0392b; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.95em; line-height: 1.4; }
        .sent { align-self: flex-end; background: #3498db; color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .system { align-self: center; font-size: 0.8em; color: #7f8c8d; background: transparent; }
        #input-area { background: white; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }

        /* Settings CSS */
        .gear-btn { background: none; border: none; color: white; cursor: pointer; font-size: 1.2em; margin-left: 10px; vertical-align: middle; }
        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; }
        #settings-modal { background: white; width: 300px; margin: 15vh auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 4px; color: #666; }
        .field input { width: 93%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

<div id="header">
    <strong>OpenClaw v2026.3.2 Gateway</strong>
    <div>
        <span id="status" class="offline">Disconnected</span>
        <button class="gear-btn" onclick="toggleModal(true)">⚙️</button>
    </div>
</div>

<div id="chat-container"></div>

<div id="input-area">
    <input type="text" id="messageInput" placeholder="Type a message to OpenClaw..." disabled>
    <button id="sendBtn" disabled>Send</button>
</div>

<div id="modal-overlay">
    <div id="settings-modal">
        <h3 style="margin-top:0">Connection Settings</h3>
        <div class="field">
            <label>HOST IP</label>
            <input type="text" id="cfg-host">
        </div>
        <div class="field">
            <label>PORT</label>
            <input type="text" id="cfg-port">
        </div>
        <div class="field">
            <label>AUTH TOKEN</label>
            <input type="password" id="cfg-token">
        </div>
        <button onclick="saveAndConnect()" style="width:100%; margin-top:10px;">Save & Connect</button>
    </div>
</div>

<script>
    // Configuration Variables
    let WS_URL = "";
    let TOKEN = "";
    
    const chatContainer = document.getElementById('chat-container');
    const statusLabel = document.getElementById('status');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    let socket;
    let lastRunId = null;
    let currentMsgElement = null;
    let isManualReset = false; // Prevents error msg during manual reconnect

    // Load saved settings on start
    window.onload = () => {
        const h = localStorage.getItem('oc_host') || "195.35.22.237";
        const p = localStorage.getItem('oc_port') || "18793";
        const t = localStorage.getItem('oc_token') || "";
        
        document.getElementById('cfg-host').value = h;
        document.getElementById('cfg-port').value = p;
        document.getElementById('cfg-token').value = t;

        if (t) {
            updateConfig(h, p, t);
            connect();
        } else {
            toggleModal(true);
        }
    };

    function toggleModal(show) {
        document.getElementById('modal-overlay').style.display = show ? 'block' : 'none';
    }

    function updateConfig(h, p, t) {
        WS_URL = `ws://${h}:${p}`;
        TOKEN = t;
    }

    function saveAndConnect() {
        const h = document.getElementById('cfg-host').value;
        const p = document.getElementById('cfg-port').value;
        const t = document.getElementById('cfg-token').value;

        localStorage.setItem('oc_host', h);
        localStorage.setItem('oc_port', p);
        localStorage.setItem('oc_token', t);

        updateConfig(h, p, t);
        isManualReset = true;
        if(socket) socket.close();
        
        toggleModal(false);
        connect();
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function connect() {
        if (!WS_URL || !TOKEN) return;
        
        addMessage(`System: Connecting to ${WS_URL}...`, "system");
        socket = new WebSocket(WS_URL);

        socket.onopen = () => {
            isManualReset = false;
            statusLabel.innerText = "Connected / Authenticating...";
            statusLabel.className = "online";
            
            const connectPayload = {
                "type": "req",
                "method": "connect",
                "id": "v3-elevated-write",
                "params": {
                    "minProtocol": 3,
                    "maxProtocol": 3,
                    "auth": { "token": TOKEN },
                    "client": {
                        "id": "openclaw-control-ui",
                        "mode": "webchat",
                        "version": "dev",
                        "platform": "Win32"
                    },
                    "scopes": ["operator.read", "operator.write", "admin", "operator.admin"]
                }
            };
            socket.send(JSON.stringify(connectPayload));
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log("Received:", data);

            if (data.id === "v3-elevated-write" && data.type === "res" && data.ok) {
                addMessage("System: Authenticated successfully!", "system");
                statusLabel.innerText = "Ready";
                messageInput.disabled = false;
                sendBtn.disabled = false;
                return;
            }

            if (data.type === "event" && data.event === "chat") {
                const payload = data.payload;
                const runId = payload.runId;
                const message = payload.message;

                if (message && message.role === "assistant") {
                    const text = message.content.map(block => block.text).join("");

                    if (runId === lastRunId && currentMsgElement) {
                        currentMsgElement.innerText = text;
                    } else {
                        lastRunId = runId;
                        currentMsgElement = document.createElement('div');
                        currentMsgElement.className = "msg received";
                        currentMsgElement.innerText = text;
                        chatContainer.appendChild(currentMsgElement);
                    }
                    
                    chatContainer.scrollTop = chatContainer.scrollHeight;

                    if (payload.state === "final") {
                        lastRunId = null;
                        currentMsgElement = null;
                    }
                }
            }
        };

        socket.onclose = () => {
            statusLabel.innerText = "Disconnected";
            statusLabel.className = "offline";
            messageInput.disabled = true;
            sendBtn.disabled = true;
            
            if (!isManualReset) {
                addMessage("System: Connection lost. Retrying in 5s...", "system");
                setTimeout(connect, 5000);
            }
        };
    }

    function sendChatMessage(text) {
        if (!text.trim()) return;

        const chatPayload = {
            "type": "req",
            "method": "chat.send",
            "id": "v3-" + Date.now(),
            "params": {
                "sessionKey": "agent:main:main",
                "idempotencyKey": "id-" + Math.random().toString(36).substr(2, 9),
                "message": text
            }
        };

        socket.send(JSON.stringify(chatPayload));
        addMessage(text, "sent");
        messageInput.value = "";
    }

    sendBtn.onclick = () => sendChatMessage(messageInput.value);
    messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendChatMessage(messageInput.value); };
</script>

</body>
</html>
